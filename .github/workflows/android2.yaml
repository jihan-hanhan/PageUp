name: Android Build2

#on:
#  push:
#    branches: [ main ]
#  pull_request:
#    branches: [ main ]
#  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 若仍有 Node 20 弃用警告，可改为 '22'

      - name: Enable corepack
        run: corepack enable
        # 注意：删除了原有的 "npm install -g pnpm"，corepack 已经足够，重复安装会导致 EEXIST 错误

      - name: Install Node dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Tauri Android 编译推荐 Java 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708 # 对应 cmdline-tools 12.0

      - name: Install Android NDK and Build Tools
        run: |
          # 使用 sdkmanager 精确安装所需的 NDK、构建工具和平台版本
          sdkmanager "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"

      - name: Build Android APK
        run: pnpm tauri android build
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          # Tauri 需要明确知道 NDK 的位置
          NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pageup-android
          # 注意：Tauri v2 默认输出路径可能包含 universal，如果上传失败找不到文件，
          # 请将路径改为: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
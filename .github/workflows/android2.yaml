name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 核心修复 1：必须使用 Node 22，以兼容 pnpm 11+ (Node 20 会导致 pnpm 崩溃)
          node-version: '22' 

      - name: Enable corepack
        run: corepack enable
        # 核心修复 2：删除了 "npm install -g pnpm"，corepack 会自动处理，重复安装会报错

      - name: Install Node dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Tauri Android 编译强依赖 Java 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Build Tools
        run: |
          # 使用 sdkmanager 精确安装，比 action 参数更稳定可靠
          sdkmanager "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"

      - name: Set up cargo-ndk
        run: cargo install cargo-ndk

      # 核心修复 3：在 build 之前，必须先初始化 Tauri Android 项目
      - name: Initialize Tauri Android Project
        run: pnpm tauri android init
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build Android APK
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/34.0.0:$PATH
          pnpm tauri android build
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: aarch64-linux-android-clang
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pageup-android
          # Tauri v2 默认通常会生成 universal APK。如果此路径找不到文件，
          # 请查看上一步日志中的 "Finished 1 APK at:" 提示，并修改为对应的路径
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Build Tools
        run: |
          sdkmanager "ndk;29.0.14206865" "build-tools;34.0.0" "platforms;android-34"

      - name: Initialize Tauri Android Project
        run: pnpm tauri android init
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build Android APK
        run: pnpm tauri android build
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore pageup-release-key.keystore -alias pageup -keyalg RSA -keysize 2048 -validity 10000 -storepass pageup123 -keypass pageup123 -dname "CN=PageUp, OU=Development, O=PageUp Inc., L=Beijing, ST=Beijing, C=CN"

      - name: Sign APK with apksigner
        run: |
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" | head -n 1)
          unsigned_apk=$(find src-tauri/gen/android/app/build/outputs/apk -name "*unsigned*.apk" | head -n 1)
          signed_apk="${unsigned_apk/unsigned/signed}"
          echo "Signing: $unsigned_apk -> $signed_apk"
          "$APKSIGNER" sign --ks pageup-release-key.keystore --ks-pass pass:pageup123 --key-pass pass:pageup123 --out "$signed_apk" "$unsigned_apk"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: pageup-android
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*signed*.apk

name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 核心修复：升级为 Node 22，以完美兼容 pnpm 11+ (要求 Node >= 22.13)
          node-version: '22' 

      - name: Enable corepack
        run: corepack enable

      - name: Install Node dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Tauri Android 编译强依赖 Java 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Build Tools
        run: |
          # 使用 sdkmanager 精确安装所需的 NDK、构建工具和平台版本，避免 Action 参数不兼容
          sdkmanager "ndk;26.1.10909125" "build-tools;34.0.0" "platforms;android-34"

      - name: Set up cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Android APK
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125
          export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/34.0.0:$PATH
          pnpm tauri android build
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: aarch64-linux-android-clang
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pageup-android
          # 如果构建日志显示输出在 universal 目录，请将路径改为:
          # src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk